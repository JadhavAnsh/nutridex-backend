services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: django_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Coolify / Production Environment variables
      - DEBUG=False
      - ALLOWED_HOSTS=*
      # If using SQLite for persistence (not ideal for strict production, but works for simpler apps/mvps)
    volumes:
      # Preserves media files uploaded directly by users
      - backend_media:/app/media
      # Preserves your SQLite local database (otherwise wiped on deploy)
      - backend_db:/app/db.sqlite3
    restart: always
    # If using more ML heavy dependencies or external db, manage those below.

volumes:
  backend_media:
  backend_db: